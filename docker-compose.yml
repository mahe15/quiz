version: '3.8'

services:
  # ── MySQL Database ──────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: quizbattle-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: quizbattle_root_2024
      MYSQL_DATABASE: quizbattle
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/questions.sql:/docker-entrypoint-initdb.d/02-questions.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── QuizBattle App (Node.js + React Static) ─────────
  app:
    build: .
    container_name: quizbattle-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: quizbattle_root_2024
      DB_NAME: quizbattle
      CLIENT_URL: http://localhost:5000
    depends_on:
      mysql:
        condition: service_healthy
        

volumes:
  mysql_data:
