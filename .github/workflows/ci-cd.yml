name: QuizBattle CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 1. CI: Lint & Build Frontend + Validate Backend ────────
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

  # ── 2. CI: Test Docker Image Build ─────────────────────────
  docker-check:
    name: Test Dockerfile Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: quizbattle:ci

  # ── 3. CD: Deploy to Server (Push to main only) ─────────────
  deploy:
    name: Deploy to Server
    needs: [ci, docker-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/quizbattle:latest

      - name: SSH Deploy to Server
        if: ${{ secrets.HOST != '' && secrets.SSH_PRIVATE_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd quiz
            git pull origin main
            docker compose pull || true
            docker compose up -d --build
            docker image prune -f
